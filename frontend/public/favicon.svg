<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#grad)" />

  <!-- Graduation Cap (mortarboard) -->
  <!-- Cap base / board -->
  <polygon points="256,140 430,220 256,300 82,220" fill="white" opacity="0.95"/>
  <!-- Cap top (square board, rotated) - already covered by polygon -->

  <!-- Hanging tassel line -->
  <line x1="430" y1="220" x2="430" y2="310" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <!-- Tassel dot -->
  <circle cx="430" cy="322" r="14" fill="white" opacity="0.9"/>

  <!-- Cap dome / head part -->
  <path d="M155,230 L155,310 C155,340 200,370 256,370 C312,370 357,340 357,310 L357,230 L256,275 Z" fill="white" opacity="0.95"/>
</svg>
